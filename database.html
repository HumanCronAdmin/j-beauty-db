<head>

<title>Database - J-Beauty DB</title>
<meta name="description" content="Browse and filter 60+ curated Japanese skincare products by category, skin type, texture, and more.">
<meta property="og:title" content="Database - J-Beauty DB">
<meta property="og:description" content="Browse and filter 60+ curated Japanese skincare products by category, skin type, texture, and more.">
<meta property="og:type" content="website">

<body>
<nav class="nav">
  <a href="index.html" class="nav-brand" style="text-decoration:none;color:var(--text)">J-Beauty<span>DB</span></a>
  <div class="nav-links">
    <a href="database.html" class="active">Database</a>
    <a href="#">Guides</a>
    <a href="#">About</a>
  </div>
</nav>
<div class="filters">
  <select id="f-cat"><option value="">All Categories</option></select>
  <select id="f-skin"><option value="">All Skin Types</option></select>
  <select id="f-texture"><option value="">All Textures</option></select>
  <select id="f-sort">
    <option value="name">Sort: Name</option>
    <option value="price">Sort: Price low-high</option>
    <option value="price_desc">Sort: Price high-low</option>
    <option value="price_per_ml">Sort: Value ($/ml)</option>
  </select>
  <input type="text" id="f-search" placeholder="Search products...">
  <label><input type="checkbox" id="f-ff"> Fragrance-free</label>
</div>
<div class="result-count" id="result-count"></div>
<div class="product-grid" id="grid"></div>
<div class="no-results" id="no-results" style="display:none">
  <p>No products match your filters. Try adjusting your search.</p>
</div>
<footer class="footer">
  <p>J-Beauty DB &mdash; built for the international J-beauty community</p>
</footer>
<script src="js/database.js"></script>
